# ZaTxGNN - South Africa Drug Repurposing Predictions

# Basic settings
title: "ZaTxGNN Drug Repurposing Reports"
description: "South Africa (SAHPRA) drug repurposing predictions powered by TxGNN"
url: "https://zatxgnn.yao.care"
baseurl: ""
lang: "en"

# Jekyll theme
remote_theme: just-the-docs/just-the-docs@v0.10.1

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Search
search_enabled: true
search:
  heading_level: 3

# Footer
footer_content: "Copyright &copy; 2026 ZaTxGNN Project. For research purposes only. Not medical advice."

# RSS Feed
feed:
  path: feed.xml
  posts_limit: 20

# Collections
collections:
  drugs:
    output: true
    permalink: /drugs/:name/
  news:
    output: true
    permalink: /news/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "drugs"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "news"
    values:
      layout: "default"

# Open Graph
og_image: "/assets/images/og-default.png"

# Twitter Card
twitter:
  card: summary_large_image

# SEO Tag defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.template"
